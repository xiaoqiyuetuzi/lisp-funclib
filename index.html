<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoLISP 函数库</title>
<style>
:root {
  --bg: #0a0a0f;
  --glass: rgba(255,255,255,0.05);
  --glass-border: rgba(255,255,255,0.10);
  --glass-hover: rgba(255,255,255,0.08);
  --text: #f0f0f5;
  --text2: rgba(240,240,245,0.5);
  --text3: rgba(240,240,245,0.3);
  --accent: #0a84ff;
  --accent2: #30d158;
  --purple: #bf5af2;
  --orange: #ff9f0a;
  --red: #ff453a;
  --teal: #5ac8fa;
  --yellow: #ffd60a;
  --radius: 16px;
  --radius-sm: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg); color: var(--text);
  height: 100vh; display: flex; flex-direction: column;
  overflow: hidden;
}

/* 背景光晕 */
body::before {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 600px 400px at 20% 20%, rgba(10,132,255,.12) 0%, transparent 70%),
    radial-gradient(ellipse 500px 300px at 80% 80%, rgba(48,209,88,.08) 0%, transparent 70%),
    radial-gradient(ellipse 400px 400px at 60% 10%, rgba(191,90,242,.06) 0%, transparent 70%);
}

/* ── 顶부 ── */
header {
  height: 60px; flex-shrink: 0; position: relative; z-index: 10;
  background: rgba(10,10,15,0.8);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-bottom: 1px solid var(--glass-border);
  display: flex; align-items: center; padding: 0 24px; gap: 16px;
}
.logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
.logo-icon {
  width: 36px; height: 36px; border-radius: 10px;
  background: linear-gradient(145deg, #0a84ff, #30d158);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 700; color: #fff;
  box-shadow: 0 4px 12px rgba(10,132,255,.4);
}
.logo-name { font-size: 17px; font-weight: 600; letter-spacing: -.3px; }
.logo-sub { font-size: 11px; color: var(--text2); margin-top: 1px; }

.search-wrap {
  flex: 1; max-width: 400px; margin-left: auto; position: relative;
}
.search-wrap input {
  width: 100%;
  background: rgba(255,255,255,0.07);
  border: 1px solid var(--glass-border);
  border-radius: 12px; padding: 8px 14px 8px 36px;
  color: var(--text); font-size: 14px; outline: none;
  backdrop-filter: blur(10px);
  transition: all .2s;
}
.search-wrap input:focus {
  background: rgba(255,255,255,0.10);
  border-color: rgba(10,132,255,.5);
  box-shadow: 0 0 0 3px rgba(10,132,255,.15);
}
.search-wrap input::placeholder { color: var(--text3); }
.search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 14px; }

.fn-count {
  font-size: 12px; color: var(--text2);
  background: var(--glass); border: 1px solid var(--glass-border);
  border-radius: 20px; padding: 5px 14px;
  backdrop-filter: blur(10px);
}

/* ── 主体 ── */
.body { display: flex; flex: 1; overflow: hidden; position: relative; z-index: 1; }

/* ── 侧边栏 ── */
#sidebar {
  width: 256px; min-width: 256px;
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(20px);
  border-right: 1px solid var(--glass-border);
  overflow-y: auto; padding: 16px 12px;
}
#sidebar::-webkit-scrollbar { width: 0; }

.cat-card {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius); margin-bottom: 10px;
  overflow: hidden;
  transition: border-color .2s;
}
.cat-card:hover { border-color: rgba(255,255,255,.15); }

.cat-header {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px; cursor: pointer; user-select: none;
}
.cat-icon {
  width: 28px; height: 28px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; flex-shrink: 0;
}
.cat-name { font-size: 13px; font-weight: 600; }
.cat-desc { font-size: 11px; color: var(--text2); margin-top: 1px; }
.cat-count {
  margin-left: auto; font-size: 11px; color: var(--text3);
  background: rgba(255,255,255,.06); border-radius: 10px;
  padding: 2px 8px; flex-shrink: 0;
}
.cat-arrow { color: var(--text3); font-size: 10px; transition: transform .25s; flex-shrink: 0; }
.cat-card.open .cat-arrow { transform: rotate(90deg); }

.func-list { display: none; border-top: 1px solid var(--glass-border); padding: 6px; }
.cat-card.open .func-list { display: block; }

.func-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 10px; border-radius: var(--radius-sm);
  cursor: pointer; font-size: 13px; color: var(--text2);
  transition: all .15s; margin-bottom: 2px;
}
.func-item:hover { background: var(--glass-hover); color: var(--text); }
.func-item.active {
  background: rgba(10,132,255,.15);
  color: var(--accent);
  font-weight: 500;
}
.func-tag {
  font-size: 10px; padding: 2px 7px; border-radius: 8px;
  background: rgba(255,255,255,.06); color: var(--text3);
}
.func-item.active .func-tag { background: rgba(10,132,255,.2); color: rgba(10,132,255,.8); }

/* ── 内容区 ── */
#main { flex: 1; overflow-y: auto; padding: 28px 32px; }
#main::-webkit-scrollbar { width: 4px; }
#main::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 2px; }

#content { max-width: 820px; margin: 0 auto; }

/* 欢迎页 */
#welcome { text-align: center; padding: 60px 20px; }
.welcome-glyph {
  width: 80px; height: 80px; margin: 0 auto 28px;
  background: linear-gradient(145deg, #0a84ff, #30d158);
  border-radius: 24px;
  display: flex; align-items: center; justify-content: center;
  font-size: 36px; font-weight: 700; color: #fff;
  box-shadow: 0 8px 32px rgba(10,132,255,.35), 0 2px 8px rgba(0,0,0,.4);
}
#welcome h2 { font-size: 30px; font-weight: 700; letter-spacing: -.5px; margin-bottom: 10px; }
#welcome p { color: var(--text2); font-size: 15px; line-height: 1.8; }
.stats {
  display: flex; gap: 16px; justify-content: center; margin-top: 40px;
}
.stat-card {
  background: var(--glass); border: 1px solid var(--glass-border);
  border-radius: var(--radius); padding: 20px 28px; text-align: center;
  backdrop-filter: blur(10px); min-width: 100px;
}
.stat-num { font-size: 32px; font-weight: 700; letter-spacing: -1px; }
.stat-label { font-size: 12px; color: var(--text2); margin-top: 4px; }

/* 函数详情 */
.fn-hero {
  background: var(--glass); border: 1px solid var(--glass-border);
  border-radius: var(--radius); padding: 28px 32px; margin-bottom: 20px;
  backdrop-filter: blur(10px);
}
.fn-name {
  font-size: 24px; font-weight: 700; letter-spacing: -.5px;
  font-family: "SF Mono", Consolas, monospace;
  color: var(--teal); margin-bottom: 10px;
}
.fn-desc { font-size: 15px; color: var(--text2); line-height: 1.7; margin-bottom: 16px; }
.badges { display: flex; gap: 8px; flex-wrap: wrap; }
.badge {
  font-size: 12px; font-weight: 500; padding: 4px 12px;
  border-radius: 20px; border: 1px solid;
}
.badge-blue  { color: var(--accent);  border-color: rgba(10,132,255,.3);  background: rgba(10,132,255,.1); }
.badge-green { color: var(--accent2); border-color: rgba(48,209,88,.3);   background: rgba(48,209,88,.1); }
.badge-purple{ color: var(--purple);  border-color: rgba(191,90,242,.3);  background: rgba(191,90,242,.1); }

/* 卡片区块 */
.card {
  background: var(--glass); border: 1px solid var(--glass-border);
  border-radius: var(--radius); margin-bottom: 16px;
  backdrop-filter: blur(10px); overflow: hidden;
}
.card-title {
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 1px; color: var(--text2);
  padding: 14px 20px 10px; border-bottom: 1px solid var(--glass-border);
}

/* 参数表 */
.param-table { width: 100%; border-collapse: collapse; }
.param-table td { padding: 12px 20px; font-size: 14px; border-bottom: 1px solid var(--glass-border); }
.param-table tr:last-child td { border-bottom: none; }
.param-table tr:hover td { background: var(--glass-hover); }
.pname { color: var(--teal); font-family: "SF Mono", Consolas, monospace; font-size: 13px; width: 160px; }
.ptype { color: var(--purple); font-family: "SF Mono", Consolas, monospace; font-size: 12px; width: 120px; }
.pdesc { color: var(--text2); }

/* 返回值 */
.returns-val {
  padding: 14px 20px; font-size: 14px;
  font-family: "SF Mono", Consolas, monospace;
  color: var(--orange);
}

/* 代码块 */
.code-block { position: relative; }
.code-block pre {
  padding: 18px 20px; font-size: 13px; line-height: 1.8;
  font-family: "SF Mono", Consolas, monospace;
  overflow-x: auto; color: var(--text);
}
.copy-btn {
  position: absolute; top: 10px; right: 10px;
  background: rgba(255,255,255,.08); border: 1px solid var(--glass-border);
  color: var(--text2); font-size: 11px; padding: 5px 12px;
  border-radius: 8px; cursor: pointer; transition: all .15s;
  opacity: 0; font-family: -apple-system, sans-serif;
}
.code-block:hover .copy-btn { opacity: 1; }
.copy-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
.copy-btn.ok { background: var(--accent2); color: #fff; border-color: var(--accent2); opacity: 1; }

/* 语法高亮 */
.kw  { color: #ff453a; }
.fn  { color: #bf5af2; }
.str { color: #30d158; }
.cmt { color: rgba(240,240,245,.3); font-style: italic; }
.var { color: #5ac8fa; }
.num { color: #ff9f0a; }
.op  { color: #ff453a; }

/* 动画 */
@keyframes up { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }
.fn-hero, .card { animation: up .25s ease both; }
.card:nth-child(2) { animation-delay: .04s; }
.card:nth-child(3) { animation-delay: .08s; }
.card:nth-child(4) { animation-delay: .12s; }
.card:nth-child(5) { animation-delay: .16s; }
</style>
</head>
<body>

<header>
  <a class="logo" href="#" onclick="showWelcome();return false;">
    <div class="logo-icon">λ</div>
    <div>
      <div class="logo-name">AutoLISP 函数库</div>
      <div class="logo-sub">xiaoqiyuetuzi</div>
    </div>
  </a>
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input id="searchInput" type="text" placeholder="搜索函数名或说明…" autocomplete="off">
  </div>
  <div class="fn-count" id="fnCount">— 个函数</div>
</header>

<div class="body">
  <div id="sidebar"><div id="nav"></div></div>
  <div id="main"><div id="content"></div></div>
</div>

<script>
const DB = {
  block: {
    label:"block", desc:"块操作", icon:"⬡", color:"#0a84ff", bg:"rgba(10,132,255,.15)",
    funcs:{
      rename:{
        name:"block:rename", tag:"常用",
        desc:"重命名块定义，图中所有同名实例自动更新。支持普通块、属性块、动态块。",
        params:[
          {name:"old-name",type:"String",desc:"原块名"},
          {name:"new-name",type:"String",desc:"新块名"}
        ],
        returns:"T 成功，nil 失败",
        example:`<span class="cmt">;;; 将图中所有 "门-900" 块改名为 "门-1000"</span>\n(<span class="fn">block:rename</span> <span class="str">"门-900"</span> <span class="str">"门-1000"</span>)`,
        src:`(<span class="kw">defun</span> <span class="fn">block:rename</span> (old-name new-name <span class="op">/</span> app doc blks obj)\n  (<span class="kw">setq</span> <span class="var">app</span>  (<span class="fn">vlax-get-acad-object</span>)\n        <span class="var">doc</span>  (<span class="fn">vla-get-ActiveDocument</span> app)\n        <span class="var">blks</span> (<span class="fn">vla-get-Blocks</span> doc))\n  (<span class="kw">if</span> (<span class="fn">not</span> (<span class="fn">vl-catch-all-error-p</span>\n             (<span class="kw">setq</span> <span class="var">obj</span> (<span class="fn">vl-catch-all-apply</span>\n               <span class="kw">'</span>vla-Item (<span class="fn">list</span> blks old-name)))))\n    (<span class="kw">if</span> (<span class="fn">not</span> (<span class="fn">vl-catch-all-error-p</span>\n               (<span class="fn">vl-catch-all-apply</span>\n                 <span class="kw">'</span>vla-put-Name (<span class="fn">list</span> obj new-name))))\n      (<span class="kw">progn</span> (<span class="fn">vla-Regen</span> doc acActiveViewport) T))))`
      },
      "get-effectivename":{
        name:"block:get-effectivename", tag:"工具",
        desc:"获取块引用的有效名称，兼容动态块和匿名块（*U 系列）。",
        params:[{name:"obj",type:"VLA-Object",desc:"块引用的 VLA 对象"}],
        returns:"String — 块的有效名称",
        example:`(<span class="kw">setq</span> <span class="var">ent</span> (<span class="fn">car</span> (<span class="fn">entsel</span> <span class="str">"\n选择块: "</span>)))\n(<span class="fn">block:get-effectivename</span>\n  (<span class="fn">vlax-ename->vla-object</span> ent))`,
        src:`(<span class="kw">defun</span> <span class="fn">block:get-effectivename</span> (obj)\n  (<span class="kw">if</span> (<span class="fn">vlax-property-available-p</span> obj <span class="kw">'</span>EffectiveName)\n    (<span class="fn">vla-get-EffectiveName</span> obj)\n    (<span class="fn">vla-get-Name</span> obj)))`
      },
      basepoint:{
        name:"block:basepoint", tag:"命令",
        desc:"修改块的基点。GKPB 保持插入点不变；GKPBR 保持块在图中的视觉位置不变，自动补偿所有引用偏移。",
        params:[
          {name:"flg",type:"T / nil",desc:"T = 保持参照位置，nil = 保持插入点"}
        ],
        returns:"nil",
        example:`<span class="cmt">;;; 命令行输入</span>\nGKPB   <span class="cmt">; 保持插入点不变</span>\nGKPBR  <span class="cmt">; 保持块在图中位置不变</span>`,
        src:`<span class="cmt">;;; 见 gkp:changebasepoint\n;;; 支持动态块属性保留\n;;; 锁定图层自动解锁后恢复\n;;; 带 Undo 标记</span>`
      }
    }
  },
  layer:{
    label:"layer", desc:"图层操作", icon:"◈", color:"#30d158", bg:"rgba(48,209,88,.15)",
    funcs:{
      "locked-p":{
        name:"layer:locked-p", tag:"判断",
        desc:"判断指定图层是否被锁定。",
        params:[{name:"layer-name",type:"String",desc:"图层名称"}],
        returns:"T 已锁定，nil 未锁定",
        example:`(<span class="fn">layer:locked-p</span> <span class="str">"墙体"</span>)  <span class="cmt">; => T 或 nil</span>`,
        src:`(<span class="kw">defun</span> <span class="fn">layer:locked-p</span> (layer-name)\n  (= <span class="num">4</span> (<span class="fn">logand</span> <span class="num">4</span>\n    (<span class="fn">cdr</span> (<span class="fn">assoc</span> <span class="num">70</span>\n      (<span class="fn">tblsearch</span> <span class="str">"LAYER"</span> layer-name))))))`
      }
    }
  },
  string:{
    label:"string", desc:"字符串处理", icon:"✦", color:"#bf5af2", bg:"rgba(191,90,242,.15)",
    funcs:{
      "valid-blockname-p":{
        name:"string:valid-blockname-p", tag:"验证",
        desc:"验证字符串是否为合法的 AutoCAD 块名（使用内置 snvalid 检查）。",
        params:[{name:"str",type:"String",desc:"待验证的字符串"}],
        returns:"T 合法，nil 非法",
        example:`(<span class="fn">string:valid-blockname-p</span> <span class="str">"门-900"</span>)  <span class="cmt">; => T</span>\n(<span class="fn">string:valid-blockname-p</span> <span class="str">"门/900"</span>)  <span class="cmt">; => nil</span>`,
        src:`(<span class="kw">defun</span> <span class="fn">string:valid-blockname-p</span> (str)\n  (<span class="fn">snvalid</span> str))`
      }
    }
  }
};

// 统计
let total = 0;
for (const c of Object.values(DB)) total += Object.keys(c.funcs).length;
document.getElementById('fnCount').textContent = total + ' 个函数';

// 侧边栏
function buildNav(filter='') {
  const nav = document.getElementById('nav');
  nav.innerHTML = '';
  for (const [ck, cat] of Object.entries(DB)) {
    const entries = Object.entries(cat.funcs).filter(([,fn]) =>
      !filter || fn.name.includes(filter) || fn.desc.includes(filter));
    if (filter && !entries.length) continue;
    const card = document.createElement('div');
    card.className = 'cat-card' + (filter ? ' open' : '');
    card.innerHTML = `
      <div class="cat-header">
        <div class="cat-icon" style="background:${cat.bg};color:${cat.color}">${cat.icon}</div>
        <div><div class="cat-name">${cat.label}</div><div class="cat-desc">${cat.desc}</div></div>
        <span class="cat-count">${Object.keys(cat.funcs).length}</span>
        <span class="cat-arrow">▶</span>
      </div>
      <div class="func-list"></div>`;
    const list = card.querySelector('.func-list');
    for (const [fk, fn] of (filter ? entries : Object.entries(cat.funcs))) {
      const item = document.createElement('div');
      item.className = 'func-item';
      item.dataset.c = ck; item.dataset.f = fk;
      item.innerHTML = `<span>${fk}</span><span class="func-tag">${fn.tag||''}</span>`;
      item.onclick = () => showFunc(ck, fk, item);
      list.appendChild(item);
    }
    card.querySelector('.cat-header').onclick = () => card.classList.toggle('open');
    nav.appendChild(card);
  }
}

// 详情
function showFunc(ck, fk, el) {
  document.querySelectorAll('.func-item').forEach(i => i.classList.remove('active'));
  if (el) { el.classList.add('active'); el.closest('.cat-card').classList.add('open'); }
  const fn = DB[ck].funcs[fk], cat = DB[ck];
  const rows = fn.params.map(p =>
    `<tr><td class="pname">${p.name}</td><td class="ptype">${p.type}</td><td class="pdesc">${p.desc}</td></tr>`
  ).join('');
  document.getElementById('content').innerHTML = `
    <div class="fn-hero">
      <div class="fn-name">${fn.name}</div>
      <div class="fn-desc">${fn.desc}</div>
      <div class="badges">
        <span class="badge badge-blue">${cat.label}</span>
        <span class="badge badge-green">${fn.tag||'util'}</span>
      </div>
    </div>
    <div class="card">
      <div class="card-title">参数</div>
      <table class="param-table"><tbody>${rows}</tbody></table>
    </div>
    <div class="card">
      <div class="card-title">返回值</div>
      <div class="returns-val">${fn.returns}</div>
    </div>
    <div class="card">
      <div class="card-title">示例</div>
      <div class="code-block">
        <pre><code>${fn.example}</code></pre>
        <button class="copy-btn" onclick="cp(this)">复制</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">源码</div>
      <div class="code-block">
        <pre><code>${fn.src}</code></pre>
        <button class="copy-btn" onclick="cp(this)">复制</button>
      </div>
    </div>`;
}

function cp(btn) {
  navigator.clipboard.writeText(btn.previousElementSibling.innerText).then(() => {
    btn.textContent = '已复制 ✓'; btn.classList.add('ok');
    setTimeout(() => { btn.textContent = '复制'; btn.classList.remove('ok'); }, 2000);
  });
}

document.getElementById('searchInput').addEventListener('input', e => buildNav(e.target.value.trim()));

function showWelcome() {
  document.querySelectorAll('.func-item').forEach(i => i.classList.remove('active'));
  document.getElementById('content').innerHTML = `
    <div id="welcome">
      <div class="welcome-glyph">λ</div>
      <h2>AutoLISP 函数库</h2>
      <p>收录常用 AutoLISP / Visual LISP 函数<br>左侧选择分类，或使用顶部搜索框快速查找</p>
      <div class="stats">
        <div class="stat-card"><div class="stat-num" style="color:#0a84ff">${total}</div><div class="stat-label">函数</div></div>
        <div class="stat-card"><div class="stat-num" style="color:#30d158">${Object.keys(DB).length}</div><div class="stat-label">分类</div></div>
        <div class="stat-card"><div class="stat-num" style="color:#bf5af2">2026</div><div class="stat-label">持续更新</div></div>
      </div>
    </div>`;
}

buildNav();
showWelcome();
</script>
</body>
</html>
